version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: school_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  app:
    build: .
    container_name: nextjs_app
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/school_db
      - JWT_SECRET=thisisasupersecretkey123!@#
    command: sh -c "npx prisma db push && npm run seed:complete && node server.js"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: